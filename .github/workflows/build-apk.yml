name: Build APK

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK to PR release
        uses: ncipollo/release-action@v1
        with:
          tag: pr-${{ github.event.pull_request.number }}
          name: PR #${{ github.event.pull_request.number }} Debug APK
          artifacts: app/build/outputs/apk/debug/app-debug.apk
          body: Automated debug APK for PR #${{ github.event.pull_request.number }}. Updated on each push.
          allowUpdates: true
          removeArtifacts: true
          prerelease: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Post sticky APK link comment
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- apk-download-comment -->';
            const apkUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/releases/download/pr-${context.issue.number}/app-debug.apk`;
            const body = `${marker}\n✅ Debug APK build complete!\n\nDownload APK directly: [app-debug.apk](${apkUrl})`;

            const comments = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });

            const existing = comments.data.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                comment_id: existing.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            }
